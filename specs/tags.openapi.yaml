openapi: 3.0.2
info:
  title: Tags API
  description: Tags API
  version: 0.0.1
  contact:
    name: CLOC.CAT
    url: https://gitlab.luizalabs.com/cloud/atlas/tags-api
paths:
  "/tags":
    post:
      tags:
        - tags
      summary: Create tag
      description: "Create a Tag"
      operationId: create_tags_tags_post
      security:
      - OAuth2:
        - tags:tags-tw
      parameters:
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
            format: uuid
            description: tenant_id for user
            title: X-Tenant-Id
          description: tenant_id for user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Body_create_tags_tags_post'
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagsOutputPublic'
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
        - tags
      summary: List tags
      description: "List all Tags"
      operationId: list_tags_tags_get
      security:
      - OAuth2:
        - tags:tags-tr
      parameters:
        - name: name
          in: query
          required: false
          schema:
            anyOf:
              - type: string
            description: name for tag
            title: Name
          description: name for tag
        - name: color
          in: query
          required: false
          schema:
            anyOf:
              - type: string
                minLength: 8
                maxLength: 8
                pattern: ^[0-9a-f]+$
            description: 8-character lowercase hexadecimal string representing RGBA, without '#' prefix.
            title: Color
          description: 8-character lowercase hexadecimal string representing RGBA, without '#' prefix.
        - name: _limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 50
            title: ' Limit'
        - name: _offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
            title: ' Offset'
        - name: _sort
          in: query
          required: false
          schema:
            type: string
            default: ""
            title: ' Sort'
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
            format: uuid
            description: tenant_id for user
            title: X-Tenant-Id
          description: tenant_id for user
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagsOutputListPublic'
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  "/tags/{name}":
    delete:
      tags:
        - tags
      summary: Delete Tag
      description: "Delete tag by name"
      operationId: delete_tag_tags__name__delete
      security:
      - OAuth2:
        - tags:tags-tw
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
            description: name for tag
            title: Name
          description: name for tag
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
            format: uuid
            description: tenant_id for user
            title: X-Tenant-Id
          description: tenant_id for user
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagsOutputPublic'
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
        - tags
      summary: Get Tag
      description: "List tag by Name"
      operationId: get_tag_tags__name__get
      security:
      - OAuth2:
        - tags:tags-tr
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
            description: name for tag
            title: Name
          description: name for tag
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
            format: uuid
            description: tenant_id for user
            title: X-Tenant-Id
          description: tenant_id for user
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagsOutputPublic'
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  "/tags/{tag_name}/values":
    post:
      tags:
        - tag-values
      summary: Create TagValue
      description: "Create a value to Tag"
      operationId: create_tag_values_tags__tag_name__values_post
      security:
      - OAuth2:
        - tags:tags-tw
      parameters:
        - name: tag_name
          in: path
          required: true
          schema:
            type: string
            description: name for tag
            title: Tag Name
          description: name for tag
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
            format: uuid
            description: tenant_id for user
            title: X-Tenant-Id
          description: tenant_id for user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Body_create_tag_values_tags__tag_name__values_post'
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagValuesOutputPublic'
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
        - tag-values
      summary: List TagValues
      description: "List all values from a Tag"
      operationId: list_tag_values_tags__tag_name__values_get
      security:
      - OAuth2:
        - tags:tags-tw
      parameters:
        - name: tag_name
          in: path
          required: true
          schema:
            type: string
            description: name for tag
            title: Tag Name
          description: name for tag
        - name: name
          in: query
          required: false
          schema:
            anyOf:
              - type: string
            description: tag value name, is allowed only one name per tag_id
            title: Name
          description: tag value name, is allowed only one name per tag_id
        - name: _limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 50
            title: ' Limit'
        - name: _offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
            title: ' Offset'
        - name: _sort
          in: query
          required: false
          schema:
            type: string
            default: ""
            title: ' Sort'
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
            format: uuid
            description: tenant_id for user
            title: X-Tenant-Id
          description: tenant_id for user
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagValuesOutputListPublic'
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  "/tags/{tag_name}/values/{value_name}":
    delete:
      tags:
        - tag-values
      summary: Delete TagValue
      description: "Delete value name from tag"
      operationId: delete_tag_values
      security:
      - OAuth2:
        - tags:tags-tw
      parameters:
        - name: tag_name
          in: path
          required: true
          schema:
            type: string
            description: name for tag
            title: Tag Name
          description: name for tag
        - name: value_name
          in: path
          required: true
          schema:
            type: string
            description: tag value name, is allowed only one name per tag_id
            title: Value Name
          description: tag value name, is allowed only one name per tag_id
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
            format: uuid
            title: X-Tenant-Id
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagValuesOutputPublic'
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
        - tag-values
      summary: Get TagValue
      description: "List value name from tag name"
      operationId: get_tag_values_tags__tag_name__values__value_name__get
      security:
      - OAuth2:
        - tags:tags-tr
      parameters:
        - name: tag_name
          in: path
          required: true
          schema:
            type: string
            description: name for tag
            title: Tag Name
          description: name for tag
        - name: value_name
          in: path
          required: true
          schema:
            type: string
            description: tag value name, is allowed only one name per tag_id
            title: Value Name
          description: tag value name, is allowed only one name per tag_id
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
            format: uuid
            title: X-Tenant-Id
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagValuesOutputPublic'
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  "/tags/{tag_name}/values/{value_name}/resources":
    post:
      tags:
        - tag-value-resource
      summary: Link a tag-value to a cloud resource
      description: "Associate tag and value to resource"
      operationId: create_tag_value_resource_tags__tag_name__values__value_name__resources_post
      security:
      - OAuth2:
        - tags:tags-tw
      parameters:
        - name: tag_name
          in: path
          required: true
          schema:
            type: string
            description: name for tag
            title: Tag Name
          description: name for tag
        - name: value_name
          in: path
          required: true
          schema:
            type: string
            description: tag value name, is allowed only one name per tag_id
            title: Value Name
          description: tag value name, is allowed only one name per tag_id
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
            format: uuid
            title: X-Tenant-Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Body_create_tag_value_resource_tags__tag_name__values__value_name__resources_post'
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagValueResourceOutputPublic'
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
        - tag-value-resource
      summary: List links between tag-values and a cloud resources
      description: "List resources by tag_name and value"
      operationId: list_tag_value_resource_tags__tag_name__values__value_name__resources_get
      security:
      - OAuth2:
        - tags:tags-tr
      parameters:
        - name: tag_name
          in: path
          required: true
          schema:
            type: string
            description: name for tag
            title: Tag Name
          description: name for tag
        - name: value_name
          in: path
          required: true
          schema:
            type: string
            description: tag value name, is allowed only one name per tag_id
            title: Value Name
          description: tag value name, is allowed only one name per tag_id
        - name: resource_type_id
          in: query
          required: false
          schema:
            anyOf:
              - type: string
                format: uuid
            description: uuid for resource type
            title: Resource Type Id
          description: uuid for resource type
        - name: region
          in: query
          required: false
          schema:
            anyOf:
              - $ref: '#/components/schemas/RegionEnum'
            description: cloud region
            title: Region
          description: cloud region
        - name: resource_id
          in: query
          required: false
          schema:
            anyOf:
              - type: string
            description: id for resource (vm, database, etc.)
            title: Resource Id
          description: id for resource (vm, database, etc.)
        - name: _limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 50
            title: ' Limit'
        - name: _offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
            title: ' Offset'
        - name: _sort
          in: query
          required: false
          schema:
            type: string
            default: ""
            title: ' Sort'
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
            format: uuid
            title: X-Tenant-Id
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagValueResourceOutputListPublic'
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  "/tags/{tag_name}/values/{value_name}/resources/{resource_id}":
    delete:
      tags:
        - tag-value-resource
      summary: Delete a link between a tag-value and a cloud resource
      description: "delete resource from tag and value"
      operationId: delete_tag_value_resource_tags__tag_name__values__value_name__resources__resource_id__delete
      security:
      - OAuth2:
        - tags:tags-tw
      parameters:
        - name: resource_id
          in: path
          required: true
          schema:
            type: string
            title: Resource Id
        - name: tag_name
          in: path
          required: true
          schema:
            type: string
            description: name for tag
            title: Tag Name
          description: name for tag
        - name: value_name
          in: path
          required: true
          schema:
            type: string
            description: tag value name, is allowed only one name per tag_id
            title: Value Name
          description: tag value name, is allowed only one name per tag_id
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
            format: uuid
            title: X-Tenant-Id
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagValueResourceOutputPublic'
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
        - tag-value-resource
      summary: Retrieve a link between a tag-value and a cloud resource
      description: "List resource by tag and value"
      operationId: get_tag_value_resource_tags__tag_name__values__value_name__resources__resource_id__get
      security:
      - OAuth2:
        - tags:tags-tr
      parameters:
        - name: resource_id
          in: path
          required: true
          schema:
            type: string
            title: Resource Id
        - name: tag_name
          in: path
          required: true
          schema:
            type: string
            description: name for tag
            title: Tag Name
          description: name for tag
        - name: value_name
          in: path
          required: true
          schema:
            type: string
            description: tag value name, is allowed only one name per tag_id
            title: Value Name
          description: tag value name, is allowed only one name per tag_id
        - name: x-tenant-id
          in: header
          required: true
          schema:
            type: string
            format: uuid
            title: X-Tenant-Id
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagValueResourceOutputPublic'
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  "/resource-types":
    get:
      tags:
        - resource-types
      summary: List all resource types
      description: "List all resource-types"
      operationId: list_resource_types
      security:
      - OAuth2:
        - tags:tags-tr
      parameters:
        - name: _limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            title: Limit
            description: Number of items per page
            default: 50
          description: Number of items per page
        - name: _offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            title: Offset
            description: Offset for pagination
            default: 0
          description: Offset for pagination
        - name: _sort
          in: query
          required: false
          schema:
            type: string
            title: Sort
            description: Sorting criteria
            default: ""
          description: Sorting criteria
        - name: name
          in: query
          required: false
          schema:
            anyOf:
              - $ref: '#/components/schemas/ResourceEnum'
            description: resource type name, must be related to a product
            title: Name
          description: resource type name, must be related to a product
        - name: product
          in: query
          required: false
          schema:
            anyOf:
              - $ref: '#/components/schemas/ProductEnum'
            description: product owner of a resource
            title: Product
          description: product owner of a resource
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceTypeOutputList'
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    Body_create_tag_value_resource_tags__tag_name__values__value_name__resources_post:
      properties:
        resource_id:
          type: string
          title: Resource Id
          description: id for resource (vm, database, etc.)
        resource_type_id:
          type: string
          format: uuid
          title: Resource Type Id
          description: uuid for resource type
        region:
          items:
           $ref: '#/components/schemas/RegionEnum'
          type: array
      type: object
      required:
        - resource_id
        - resource_type_id
        - region
      title: Body_create_tag_value_resource_tags__tag_name__values__value_name__resources_post
    Body_create_tag_values_tags__tag_name__values_post:
      properties:
        name:
          type: string
          title: Name
          description: tag value name, is allowed only one name per tag_id
        description:
          anyOf:
            - type: string
          title: Description
          description: description for this tag value
      type: object
      required:
        - name
      title: Body_create_tag_values_tags__tag_name__values_post
    Body_create_tags_tags_post:
      properties:
        name:
          type: string
          title: Name
          description: name for tag
        color:
          anyOf:
            - type: string
              maxLength: 8
              minLength: 8
              pattern: ^[0-9a-f]+$
          title: Color
          description: 8-character lowercase hexadecimal string representing RGBA, without '#' prefix.
      type: object
      required:
        - name
      title: Body_create_tags_tags_post
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    ProductEnum:
      type: string
      enum:
        - object-storage
        - network
        - virtual-machine
        - block-storage
        - kubernetes
        - container-registry
        - database
        - load-balancer
      title: ProductEnum
    RegionEnum:
      type: string
      enum:
        - br-se1
        - br-ne1
      title: RegionEnum
    ResourceEnum:
      type: string
      enum:
        - bucket
        - objects
        - nat-gateways
        - ports
        - public-ips
        - rules
        - security-groups
        - subnets
        - vpcs
        - images
        - instances-vm
        - snapshots-vm
        - snapshots-bs
        - volumes
        - cluster
        - nodepool
        - registries
        - repositories
        - clusters
        - instances-db
        - parameter-groups
        - replicas
        - snapshots-db
        - network-acls
        - network-backends
        - network-certificates
        - network-healthcheck
        - network-listeners
        - network-loadbalancers
      title: ResourceEnum
    ResourceTypeOutput:
      properties:
        name:
          items:
            $ref: '#/components/schemas/ResourceEnum'
          type: array
        product:
          items:
            $ref: '#/components/schemas/ProductEnum'
          type: array
        created_at:
          type: string
          format: date-time
          title: Created At
          description: element creation date
        updated_at:
          anyOf:
            - type: string
              format: date-time
          title: Updated At
          description: element last update date, None if never updated
      type: object
      required:
        - name
        - product
        - created_at
      title: ResourceTypeOutput
    ResourceTypeOutputList:
      properties:
        results:
          items:
            $ref: '#/components/schemas/ResourceTypeOutput'
          type: array
          title: Results
      type: object
      required:
        - results
      title: ResourceTypeOutputList
    TagValueResourceOutputListPublic:
      properties:
        results:
          items:
            $ref: '#/components/schemas/TagValueResourceOutputPublic'
          type: array
          title: Results
      type: object
      required:
        - results
      title: TagValueResourceOutputListPublic
    TagValueResourceOutputPublic:
      properties:
        resource_id:
          type: string
          title: Resource Id
          description: id for resource (vm, database, etc.)
        resource_type_id:
          type: string
          format: uuid
          title: Resource Type Id
          description: uuid for resource type
        region:
          items:
            $ref: '#/components/schemas/RegionEnum'
          type: array
        created_at:
          type: string
          format: date-time
          title: Created At
          description: element creation date
        updated_at:
          anyOf:
            - type: string
              format: date-time
          title: Updated At
          description: element last update date, None if never updated
      type: object
      required:
        - resource_id
        - resource_type_id
        - region
        - created_at
      title: TagValueResourceOutputPublic
    TagValuesOutputListPublic:
      properties:
        results:
          items:
            $ref: '#/components/schemas/TagValuesOutputPublic'
          type: array
          title: Results
      type: object
      required:
        - results
      title: TagValuesOutputListPublic
    TagValuesOutputPublic:
      properties:
        name:
          type: string
          title: Name
          description: tag value name, is allowed only one name per tag_id
        description:
          anyOf:
            - type: string
          title: Description
          description: description for this tag value
        created_at:
          type: string
          format: date-time
          title: Created At
          description: element creation date
        updated_at:
          anyOf:
            - type: string
              format: date-time
          title: Updated At
          description: element last update date, None if never updated
      type: object
      required:
        - name
        - description
        - created_at
      title: TagValuesOutputPublic
    TagsOutputListPublic:
      properties:
        results:
          items:
            $ref: '#/components/schemas/TagsOutputPublic'
          type: array
          title: Results
      type: object
      required:
        - results
      title: TagsOutputListPublic
    TagsOutputPublic:
      properties:
        name:
          type: string
          title: Name
          description: name for tag
        color:
          anyOf:
            - type: string
          title: Color
          description: 8-character lowercase hexadecimal string representing RGBA, without '#' prefix.
        created_at:
          type: string
          format: date-time
          title: Created At
          description: element creation date
        updated_at:
          anyOf:
            - type: string
              format: date-time
          title: Updated At
          description: element last update date, None if never updated
      type: object
      required:
        - name
        - created_at
      title: TagsOutputPublic
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
              - type: string
              - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
        - loc
        - msg
        - type
      title: ValidationError
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        password:
          scopes:
            openid: Default OpenID scope.
            tags:tags-tw: This scope allow the caller to write on Tags
            tags:tags-tr: This scope allow the caller to read on Tags
