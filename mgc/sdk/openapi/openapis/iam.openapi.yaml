openapi: 3.0.3
info:
    title: Magalu Cloud IAM
    description: The Magalu Cloud IAM.
    version: 0.1.0
servers:
-   url: https://{env}/iam
    variables:
        env:
            description: Environment to use
            default: api.magalu.cloud
            enum:
            - api.magalu.cloud
            - api.pre-prod.jaxyendy.com
            x-mgc-transforms:
            -   type: translate
                translations:
                -   from: prod
                    to: api.magalu.cloud
                -   from: pre-prod
                    to: api.pre-prod.jaxyendy.com
