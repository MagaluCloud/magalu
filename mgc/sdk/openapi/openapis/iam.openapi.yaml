    /api/v1/healthcheck:
        get:
            tags:
            - Healthcheck
            summary: Healthcheck
            operationId: healthcheck_api_v1_healthcheck_get
            responses:
                '200':
                    description: Successful Response
                    content:
                        application/json:
                            schema: {}
                '403':
                    description: Forbidden
                    content:
                        application/json:
                            example:
                                origin: permissionsAPI
                                permission: turia_iam_editor
                                product: turiaiam
                                message: User action not authorized for permission
                                    turia_iam_editor
            x-mgc-hidden: true
            security:
            -   OAuth2:
                - iam.read
    /api/v1/members:
        get:
            tags:
            - Members
            summary: Get Members
            operationId: get_members_api_v1_members_get
