openapi: 3.0.3
info:
    title: Tags API
    description: Tags API
    contact:
        name: XPNG.CAT
        url: https://github.com/luizalabs
    version: 0.1.0
paths:
    /readiness:
        get:
            tags:
            - healthcheck
            x-mgc-hidden: true
            summary: Healthcheck Readiness
            operationId: healthcheck_readiness_readiness_get
            responses:
                '200':
                    description: Successful Response
                    content:
                        application/json:
                            schema: {}
            security:
            -   OAuth2:
                - tag.read
    /v0/tags:
        post:
            summary: Create tag
            description: 'If values are informed, they will be created either; max
                size for values list accepted on creation is: 50'
            operationId: create_tags_public
            security:
            -   OAuth2:
                - tags:tags-tw
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/Body_create_tags_public'
            responses:
                '200':
                    description: Successful Response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ComposedTagsAndTagValuesOutputPublic'
                '422':
                    description: Validation Error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/HTTPValidationError'
        get:
            summary: List tags
            operationId: list_tags_public
            security:
            -   OAuth2:
                - tags:tags-tr
            parameters:
            -   name: name
                in: query
                required: false
                schema:
                    description: name for tag
                    title: Name
                    nullable: true
                    type: string
                    minLength: 1
                    maxLength: 72
                    pattern: ^[\w\ \-\[\]\(\)\.\:]+$
                description: name for tag
            -   name: color
                in: query
                required: false
                schema:
                    description: 8-character lowercase hexadecimal string representing
                        RGBA, without '#' prefix.
                    title: Color
                    nullable: true
                    type: string
                    minLength: 6
                    maxLength: 6
                    pattern: ^[0-9a-fA-F]+$
                    example: ffffff00
                description: 8-character lowercase hexadecimal string representing
                    RGBA, without '#' prefix.
            -   name: kinds
                in: query
                required: false
                schema:
                    description: a tag kind describe the purpose for this tag in mgc,
                        the most common case is kind finops.
                    title: Kinds
                    nullable: true
                    type: array
                    items:
                        $ref: '#/components/schemas/TagKinds'
                    example:
                    - finops
                description: a tag kind describe the purpose for this tag in mgc,
                    the most common case is kind finops.
            -   name: _limit
                in: query
                required: false
                schema:
                    type: integer
                    maximum: 100
                    minimum: 1
                    default: 20
                    title: ' Limit'
            -   name: _offset
                in: query
                required: false
                schema:
                    type: integer
                    minimum: 0
                    default: 0
                    title: ' Offset'
            -   name: _sort
                in: query
                required: false
                schema:
                    type: string
                    default: ''
                    title: ' Sort'
            responses:
                '200':
                    description: Successful Response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/TagsOutputListPublic'
                '422':
                    description: Validation Error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/HTTPValidationError'
    /v0/tags/{name}:
        patch:
            summary: Update Tag
            operationId: update_tags_public
            security:
            -   OAuth2:
                - tags:tags-tw
            parameters:
            -   name: name
                in: path
                required: true
                schema:
                    type: string
                    description: name for tag
                    title: Name
                    example: kubernetes-expenses
                description: name for tag
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/Body_update_tags_public'
            responses:
                '200':
                    description: Successful Response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/TagsOutputPublic'
                '422':
                    description: Validation Error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/HTTPValidationError'
        delete:
            summary: Delete Tag
            operationId: delete_tags_public
            security:
            -   OAuth2:
                - tags:tags-tw
            parameters:
            -   name: name
                in: path
                required: true
                schema:
                    type: string
                    description: name for tag
                    title: Name
                    example: kubernetes-expenses
                description: name for tag
            responses:
                '200':
                    description: Successful Response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/TagsOutputPublic'
                '422':
                    description: Validation Error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/HTTPValidationError'
        get:
            summary: Get Tag
            operationId: get_tags_public
            security:
            -   OAuth2:
                - tags:tags-tr
            parameters:
            -   name: name
                in: path
                required: true
                schema:
                    type: string
                    description: name for tag
                    title: Name
                    example: kubernetes-expenses
                description: name for tag
            responses:
                '200':
                    description: Successful Response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/TagsOutputPublic'
                '422':
                    description: Validation Error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/HTTPValidationError'
    /v0/tags/{tag_name}/values:
        post:
            tags:
            - values
            summary: Create TagValue
            operationId: create_tag_values_v0_tags__tag_name__values_post
            security:
            -   OAuth2:
                - tags:tags-tw
            parameters:
            -   name: tag_name
                in: path
                required: true
                schema:
                    type: string
                    description: name for tag
                    title: Tag Name
                description: name for tag
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/Body_create_tag_values_v0_tags__tag_name__values_post'
            responses:
                '200':
                    description: Successful Response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/TagValuesOutputPublic'
                    links:
                        list:
                            operationId: list_tag_values_v0_tags__tag_name__values_get
                            description: List TagValues
                            parameters:
                                tag_name: $request.path.tag_name
                        get:
                            operationId: get_tag_values_v0_tags__tag_name__values__value_name__get
                            description: Get TagValue
                            parameters:
                                tag_name: $request.path.tag_name
                                value_name: $request.body#/name
                        update:
                            operationId: update_tag_values_v0_tags__tag_name__values__value_name__patch
                            description: Update TagValue
                            parameters:
                                tag_name: $request.path.tag_name
                                value_name: $request.body#/name
                        delete:
                            operationId: delete_tag_values
                            description: Delete TagValue
                            parameters:
                                tag_name: $request.path.tag_name
                                value_name: $request.body#/name
                '422':
                    description: Validation Error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/HTTPValidationError'
        get:
            tags:
            - values
            summary: List TagValues
            operationId: list_tag_values_v0_tags__tag_name__values_get
            security:
            -   OAuth2:
                - tags:tags-tr
            parameters:
            -   name: tag_name
                in: path
                required: true
                schema:
                    type: string
                    description: name for tag
                    title: Tag Name
                description: name for tag
            -   name: name
                in: query
                required: false
                schema:
                    description: tag value name, is allowed only one name per tag_id
                    title: Name
                    nullable: true
                    type: string
                    minLength: 1
                    maxLength: 72
                    pattern: ^[\w\ \-\[\]\(\)\.\:]+$
                description: tag value name, is allowed only one name per tag_id
            -   name: _limit
                in: query
                required: false
                schema:
                    type: integer
                    maximum: 100
                    minimum: 1
                    default: 20
                    title: ' Limit'
            -   name: _offset
                in: query
                required: false
                schema:
                    type: integer
                    minimum: 0
                    default: 0
                    title: ' Offset'
            -   name: _sort
                in: query
                required: false
                schema:
                    type: string
                    default: ''
                    title: ' Sort'
            responses:
                '200':
                    description: Successful Response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/TagValuesOutputListPublic'
                '422':
                    description: Validation Error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/HTTPValidationError'
    /v0/tags/{tag_name}/values/{value_name}:
        delete:
            tags:
            - values
            summary: Delete TagValue
            operationId: delete_tag_values
            security:
            -   OAuth2:
                - tags:tags-tw
            parameters:
            -   name: tag_name
                in: path
                required: true
                schema:
                    type: string
                    description: name for tag
                    title: Tag Name
                    example: kubernetes-expenses
                description: name for tag
            -   name: value_name
                in: path
                required: true
                schema:
                    type: string
                    description: tag value name, is allowed only one name per tag_id
                    title: Value Name
                    example: test-labs
                description: tag value name, is allowed only one name per tag_id
            responses:
                '200':
                    description: Successful Response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/TagValuesOutputPublic'
                '422':
                    description: Validation Error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/HTTPValidationError'
        patch:
            tags:
            - values
            summary: Update TagValue
            operationId: update_tag_values_v0_tags__tag_name__values__value_name__patch
            security:
            -   OAuth2:
                - tags:tags-tr
            parameters:
            -   name: tag_name
                in: path
                required: true
                schema:
                    type: string
                    description: name for tag
                    title: Tag Name
                    example: kubernetes-expenses
                description: name for tag
            -   name: value_name
                in: path
                required: true
                schema:
                    type: string
                    description: tag value name, is allowed only one name per tag_id
                    title: Value Name
                    example: test-labs
                description: tag value name, is allowed only one name per tag_id
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/Body_update_tag_values_v0_tags__tag_name__values__value_name__patch'
            responses:
                '200':
                    description: Successful Response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/TagValuesOutputPublic'
                    links:
                        list:
                            operationId: list_tag_values_v0_tags__tag_name__values_get
                            description: List TagValues
                            parameters:
                                tag_name: $request.path.tag_name
                        create:
                            operationId: create_tag_values_v0_tags__tag_name__values_post
                            description: Create TagValue
                            parameters:
                                tag_name: $request.path.tag_name
                            x-mgc-wait-termination:
                                interval: 5s
                                maxRetries: 10
                                jsonPathQuery: $.result.description == $.owner.parameters.description
                        get:
                            operationId: get_tag_values_v0_tags__tag_name__values__value_name__get
                            description: Get TagValue
                            parameters:
                                tag_name: $request.path.tag_name
                                value_name: $response.body#/name
                            x-mgc-wait-termination:
                                interval: 5s
                                maxRetries: 10
                                jsonPathQuery: $.result.description == $.owner.parameters.description
                        delete:
                            operationId: delete_tag_values
                            description: Delete TagValue
                            parameters:
                                tag_name: $request.path.tag_name
                                value_name: $response.body#/name
                            x-mgc-wait-termination:
                                interval: 5s
                                maxRetries: 10
                                jsonPathQuery: $.result.description == $.owner.parameters.description
                '422':
                    description: Validation Error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/HTTPValidationError'
        get:
            tags:
            - values
            summary: Get TagValue
            operationId: get_tag_values_v0_tags__tag_name__values__value_name__get
            security:
            -   OAuth2:
                - tags:tags-tr
            parameters:
            -   name: tag_name
                in: path
                required: true
                schema:
                    type: string
                    description: name for tag
                    title: Tag Name
                    example: kubernetes-expenses
                description: name for tag
            -   name: value_name
                in: path
                required: true
                schema:
                    type: string
                    description: tag value name, is allowed only one name per tag_id
                    title: Value Name
                    example: test-labs
                description: tag value name, is allowed only one name per tag_id
            responses:
                '200':
                    description: Successful Response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/TagValuesOutputPublic'
                    links:
                        list:
                            operationId: list_tag_values_v0_tags__tag_name__values_get
                            description: List TagValues
                            parameters:
                                tag_name: $request.path.tag_name
                        create:
                            operationId: create_tag_values_v0_tags__tag_name__values_post
                            description: Create TagValue
                            parameters:
                                tag_name: $request.path.tag_name
                        update:
                            operationId: update_tag_values_v0_tags__tag_name__values__value_name__patch
                            description: Update TagValue
                            parameters:
                                tag_name: $request.path.tag_name
                                value_name: $response.body#/name
                        update/description:
                            operationId: update_tag_values_v0_tags__tag_name__values__value_name__patch
                            description: Update TagValue
                            parameters:
                                tag_name: $request.path.tag_name
                                value_name: $response.body#/name
                            x-mgc-hidden: true
                        delete:
                            operationId: delete_tag_values
                            description: Delete TagValue
                            parameters:
                                tag_name: $request.path.tag_name
                                value_name: $response.body#/name
                '422':
                    description: Validation Error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/HTTPValidationError'
    /v0/tags/{tag_name}/values/{value_name}/resources:
        post:
            tags:
            - value-resources
            summary: Link a tag-value to a cloud resource
            operationId: create_tag_value_resource_v0_tags__tag_name__values__value_name__resources_post
            security:
            -   OAuth2:
                - tags:tags-tw
            parameters:
            -   name: tag_name
                in: path
                required: true
                schema:
                    type: string
                    description: name for tag
                    title: Tag Name
                    example: kubernetes-expenses
                description: name for tag
            -   name: value_name
                in: path
                required: true
                schema:
                    type: string
                    description: tag value name, is allowed only one name per tag_id
                    title: Value Name
                    example: test-labs
                description: tag value name, is allowed only one name per tag_id
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/Body_create_tag_value_resource_v0_tags__tag_name__values__value_name__resources_post'
            responses:
                '200':
                    description: Successful Response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/TagValueResourcesOutputPublic'
                    links:
                        delete:
                            operationId: delete_tag_value_resource_v0_tags__tag_name__values__value_name__resources__resource_id__delete
                            description: Delete a link between a tag-value and a cloud
                                resource
                            parameters:
                                resource_id: $request.body#/resource_id
                                tag_name: $request.path.tag_name
                                value_name: $request.path.value_name
                            x-mgc-wait-termination:
                                interval: 5s
                                maxRetries: 10
                                jsonPathQuery: $.result.resource_id == $.owner.parameters.resource_id
                '422':
                    description: Validation Error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/HTTPValidationError'
    /v0/tags/{tag_name}/values/{value_name}/resources/{resource_id}:
        delete:
            tags:
            - value-resources
            summary: Delete a link between a tag-value and a cloud resource
            operationId: delete_tag_value_resource_v0_tags__tag_name__values__value_name__resources__resource_id__delete
            security:
            -   OAuth2:
                - tags:tags-tw
            parameters:
            -   name: resource_id
                in: path
                required: true
                schema:
                    type: string
                    format: uuid
                    title: Resource Id
            -   name: tag_name
                in: path
                required: true
                schema:
                    type: string
                    description: name for tag
                    title: Tag Name
                    example: kubernetes-expenses
                description: name for tag
            -   name: value_name
                in: path
                required: true
                schema:
                    type: string
                    description: tag value name, is allowed only one name per tag_id
                    title: Value Name
                    example: test-labs
                description: tag value name, is allowed only one name per tag_id
            responses:
                '200':
                    description: Successful Response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/TagValueResourcesOutputPublic'
                '422':
                    description: Validation Error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/HTTPValidationError'
    /v0/resource-types:
        get:
            tags:
            - resource-types
            summary: List all resource types
            operationId: list_resource_types
            security:
            -   OAuth2:
                - tags:tags-tr
            parameters:
            -   name: _limit
                in: query
                required: false
                schema:
                    type: integer
                    maximum: 100
                    minimum: 1
                    title: Limit
                    description: Number of items per page
                    default: 20
                description: Number of items per page
            -   name: _offset
                in: query
                required: false
                schema:
                    type: integer
                    minimum: 0
                    title: Offset
                    description: Offset for pagination
                    default: 0
                description: Offset for pagination
            -   name: _sort
                in: query
                required: false
                schema:
                    type: string
                    title: Sort
                    description: Sorting criteria
                    default: ''
                description: Sorting criteria
            -   name: name
                in: query
                required: false
                schema:
                    description: resource type name, must be related to a product
                    title: Name
                    nullable: true
                    $ref: '#/components/schemas/ResourceEnum'
                description: resource type name, must be related to a product
            -   name: product
                in: query
                required: false
                schema:
                    description: product owner of a resource
                    title: Product
                    nullable: true
                    $ref: '#/components/schemas/ProductEnum'
                description: product owner of a resource
            responses:
                '200':
                    description: Successful Response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ResourceTypesOutputListPublic'
                '422':
                    description: Validation Error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/HTTPValidationError'
    /v0/projects:
        post:
            tags:
            - projects
            summary: Create project
            operationId: create_projects_public
            security:
            -   OAuth2:
                - tags:projects-tw
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/Body_create_projects_public'
            responses:
                '201':
                    description: Successful Response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ProjectsOutputPublic'
                    links:
                        get:
                            operationId: get_projects_public
                            description: Get project
                            parameters:
                                name: $request.body#/name
                        update:
                            operationId: update_projects_public
                            description: Update project
                            parameters:
                                name: $request.body#/name
                '422':
                    description: Validation Error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/HTTPValidationError'
        get:
            tags:
            - projects
            summary: List all projects
            operationId: list_projects_public
            security:
            -   OAuth2:
                - tags:projects-tr
            parameters:
            -   name: name
                in: query
                required: false
                schema:
                    description: name for project
                    title: Name
                    nullable: true
                    type: string
                    minLength: 1
                    maxLength: 72
                    pattern: ^[\w\ \-\[\]\(\)\.\:]+$
                    example: Development environment for testing and feature implementation.
                description: name for project
            -   name: _limit
                in: query
                required: false
                schema:
                    type: integer
                    maximum: 100
                    minimum: 1
                    default: 20
                    title: ' Limit'
            -   name: _offset
                in: query
                required: false
                schema:
                    type: integer
                    minimum: 0
                    default: 0
                    title: ' Offset'
            -   name: _sort
                in: query
                required: false
                schema:
                    type: string
                    default: ''
                    title: ' Sort'
            responses:
                '200':
                    description: Successful Response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ProjectsOutputListPublic'
                '422':
                    description: Validation Error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/HTTPValidationError'
    /v0/projects/{name}:
        patch:
            tags:
            - projects
            summary: Update project
            description: Update a project. Default project cannot be modified.
            operationId: update_projects_public
            security:
            -   OAuth2:
                - tags:projects-tw
            parameters:
            -   name: name
                in: path
                required: true
                schema:
                    type: string
                    description: name for project
                    title: Name
                    example: sandbox
                description: name for project
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ProjectsUpdateInput'
            responses:
                '200':
                    description: Successful Response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ProjectsOutputPublic'
                    links:
                        get:
                            operationId: get_projects_public
                            description: Get project
                            parameters:
                                name: $request.path.name
                            x-mgc-wait-termination:
                                interval: 5s
                                maxRetries: 10
                                jsonPathQuery: $.result.description == $.owner.parameters.description
                '422':
                    description: Validation Error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/HTTPValidationError'
        get:
            tags:
            - projects
            summary: Get project
            operationId: get_projects_public
            security:
            -   OAuth2:
                - tags:projects-tr
            parameters:
            -   name: name
                in: path
                required: true
                schema:
                    type: string
                    description: name for project
                    title: Name
                    example: sandbox
                description: name for project
            responses:
                '200':
                    description: Successful Response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ProjectsOutputPublic'
                    links:
                        update:
                            operationId: update_projects_public
                            description: Update project
                            parameters:
                                name: $request.path.name
                        update/description:
                            operationId: update_projects_public
                            description: Update project
                            parameters:
                                name: $request.path.name
                            x-mgc-hidden: true
                '422':
                    description: Validation Error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/HTTPValidationError'
    /v0/resources/{id}:
        get:
            tags:
            - resources
            summary: Get resource
            operationId: get_resources_public
            security:
            -   OAuth2:
                - tags:tags-tr
                - tags:projects-tr
            parameters:
            -   name: id
                in: path
                required: true
                schema:
                    type: string
                    format: uuid
                    title: Id
            -   name: _limit
                in: query
                required: false
                schema:
                    type: integer
                    maximum: 100
                    minimum: 1
                    title: Limit
                    description: Number of items per page
                    default: 20
                description: Number of items per page
            -   name: _offset
                in: query
                required: false
                schema:
                    type: integer
                    minimum: 0
                    title: Offset
                    description: Offset for pagination
                    default: 0
                description: Offset for pagination
            responses:
                '200':
                    description: Successful Response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ResourcesOutputPublicExpanded'
                '422':
                    description: Validation Error
                    content:
                        application/json:
                            schema:
