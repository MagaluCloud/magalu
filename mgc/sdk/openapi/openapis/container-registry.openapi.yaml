            description: "Cancels an image scan job and its associated child architectures.\
                \ \nOnly scans in 'CREATED' or 'IN_PROGRESS' status can be stopped.\n"
            operationId: stopImageScan
            x-permission:
                permission-name: cr_image_scan
                product-name: containerregistry
            security:
            -   BearerAuth: []
            -   OAuth2:
                - mcr.write
            parameters:
            -   name: scan_id
                in: path
                required: true
                description: Unique identifier of the scan job (UUID)
                schema:
                    type: string
                    format: uuid
            responses:
                '204':
                    description: Scan successfully stopped or already in a terminal
                        state.
                    links:
                        get:
                            operationId: getImageScan
                            description: Get image scan details
                            parameters:
                                scan_id: $request.path.scan_id
                        vulnerabilities:
                            operationId: getImageScanVulnerabilities
                            description: List vulnerabilities for an image scan
                            parameters:
                                scan_id: $request.path.scan_id
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '404':
                    $ref: '#/components/responses/NotFoundError'
                '500':
                    $ref: '#/components/responses/InternalServerError'
components:
    schemas:
        ListMetadata:
            type: object
            required:
            - page
            properties:
                page:
                    $ref: '#/components/schemas/PaginationMetadata'
        PaginationMetadata:
            type: object
            required:
            - count
            - limit
            - offset
            - total
            properties:
                count:
                    type: integer
                    example: 50
                    description: Number of items on the current page.
                limit:
                    type: integer
                    example: 50
                    description: Maximum number of items per page.
                offset:
                    type: integer
                    example: 0
                    description: Offset of the first item on the current page.
                total:
                    type: integer
                    example: 100
                    description: Total number of items across all pages.
        UpdateProxyCacheRequest:
            type: object
            description: Update Proxy cache Request Object.
            properties:
                name:
                    type: string
                    default: ''
                    description: A unique name for each tenant, used for the proxy-cache.
                        It must be written in lowercase letters and consists only
                        of numbers and letters, up to a limit of 63 characters.
                url:
                    type: string
                    default: ''
                    description: An Endpoint URL for the proxied registry. Example
                        URL for available providers can be checked through mcr-api
                        or mgccli.
                access_key:
                    type: string
                    description: A string consistent with provider access_id.
                    default: ''
                access_secret:
                    type: string
                    description: A string consistent with provider access_secret.
                    default: ''
                description:
                    type: string
                    description: A string.
                    default: ''
            example:
                name: updated_cool_registry_proxy
                url: https://hub.docker.com
                access_key: example-access-key
                access_secret: example-access-secret
                description: cool_description
        ProxyCacheRequest:
            type: object
            description: Proxy cache Request Object.
            properties:
                name:
                    type: string
                    description: A unique name for each tenant, used for the proxy-cache.
                        It must be written in lowercase letters and consists only
                        of numbers and letters, up to a limit of 63 characters.
                provider:
                    type: string
                    description: A provider identifier string. Available providers
                        can be checked through mcr-api or mgccli.
                url:
                    type: string
                    description: An Endpoint URL for the proxied registry. Example
                        URL for available providers can be checked through mcr-api
                        or mgccli.
                access_key:
                    type: string
                    description: A string consistent with provider access_id.
                    default: ''
                access_secret:
                    type: string
                    description: A string consistent with provider access_secret.
                    default: ''
                description:
                    type: string
                    description: A string.
                    default: ''
            required:
            - name
            - provider
            - url
            example:
                name: cool_registry_proxy
                provider: docker-hub
                url: https://hub.docker.com
                access_key: example-access-key
                access_secret: example-access-secret
                description: cool_description
        ProxyCacheCredentialStatusRequest:
            type: object
            description: Validate remote proxy cache credentials
            properties:
                provider:
                    type: string
                    description: Type of the remote registry (e.g., harbor, dockerhub)
                url:
                    type: string
                    description: Endpoint URL of the remote registry
                    x-go-name: URL
                access_key:
                    type: string
                    description: Access key or username for authentication
                access_secret:
                    type: string
                    description: Secret or password for authentication
            required:
            - provider
            - url
            - credential_type
            - access_key
            - access_secret
            example:
                provider: docker-hub
                url: https://hub.docker.com
                credential_type: basic
                access_key: my_username
                access_secret: my_password
        MemberUpdateRequest:
            type: object
            description: Member update Request Object.
            required:
            - role
            properties:
                role:
                    type: string
                    description: The new role to assign to the member.
                    enum:
                    - developer
                    - guest
            example:
                role: developer
        MemberRequest:
            type: object
            description: Member addition Request Object.
            required:
            - user_id
            properties:
                user_id:
                    type: string
                    format: uuid
                    description: User's UUID to be added to the registry.
                role:
                    type: string
                    description: 'The role to assign to the member. If not provided,
                        ''guest'' will be used by default.

                        - developer: Can push and pull images

                        - guest: Read-only access (pull images)

                        '
                    default: guest
                    enum:
                    - developer
                    - guest
            example:
                user_id: e3d49354-35d7-4565-b634-65d8b86aa594
                role: guest
        ProxyCacheCredentialStatusResponse:
            type: object
            description: Result of validating the proxy cache credentials
            properties:
                status:
                    type: string
                    description: Connection status (e.g., "valid", "invalid")
                message:
                    type: string
                    description: Additional details about the result of the validation
            required:
            - status
            example:
                status: valid
                message: Proxy cache credentials are valid
        CreateProxyCacheResponse:
            type: object
            description: Proxy Cache creation response.
            properties:
                id:
                    type: string
                    description: Proxy Cache UUID.
                name:
                    type: string
                    description: A unique, global name for the container registry.
                        It must be written in lowercase letters and consists only
                        of numbers and letters, up to a limit of 63 characters.
            required:
            - id
            - name
            example:
                id: 0c6bbd87-881a-4bf8-b3f6-4ff3ceacb42c
                name: cool_registry_proxy
        UpdateProxyCacheResponse:
            type: object
            description: Proxy Cache update response.
            required:
            - id
            - name
            - provider
            - url
            - created_at
            - updated_at
            properties:
                id:
                    type: string
                    description: Proxy Cache's UUID.
                name:
                    type: string
                    description: Name of the proxy cache created.
                provider:
                    type: string
                    description: Name of proxy cache registry provider.
                url:
                    type: string
                    description: URL of proxy cache provider.
                created_at:
                    type: string
                    description: Date and time of creation of the proxy cache.
                updated_at:
                    type: string
                    description: Date and time of the last change to the proxy cache.
            example:
                id: 0c6bbd87-881a-4bf8-b3f6-4ff3ceacb42c
                name: cool_proxy
                provider: docker-hub
                url: https://hub.docker.com
                created_at: '2024-05-15T19:56:47Z'
                updated_at: '2024-05-15T19:56:47Z'
                description: Proxy cache for Docker Hub
        ProxyCacheDetailedResponse:
            type: object
            description: Container Proxy Cache's response data.
            required:
            - id
            - name
            - provider
            - url
            - created_at
            - updated_at
            - description
            properties:
                id:
                    type: string
                    description: Proxy Cache's UUID.
                name:
                    type: string
                    description: Name of the proxy cache .
                provider:
                    type: string
                    description: Name of proxy cache registry provider.
                url:
                    type: string
                    description: URL of proxy cache provider.
                    x-go-name: URL
                created_at:
                    type: string
                    description: Date and time of creation of the proxy cache.
                updated_at:
                    type: string
                    description: Date and time of the last change to the proxy cache.
                description:
                    type: string
                    description: Description of the proxy-cache
            example:
                id: 0c6bbd87-881a-4bf8-b3f6-4ff3ceacb42c
                name: cool_proxy
                provider: docker-hub
                url: https://hub.docker.com
                created_at: '2024-05-15T19:56:47Z'
                updated_at: '2024-05-15T19:56:47Z'
                description: Proxy cache for Docker Hub
        ProxyCachesResponse:
            type: object
            description: Proxy cache information response object.
            required:
            - results
            - meta
            properties:
                results:
                    type: array
                    description: List of user proxy caches.
                    items:
                        $ref: '#/components/schemas/ProxyCacheResponse'
                meta:
                    $ref: '#/components/schemas/ListMetadata'
        ProxyCacheResponse:
            type: object
            description: Container Proxy Cache's response data.
            required:
            - id
            - name
            - provider
            - url
            - created_at
            - updated_at
            properties:
                id:
                    type: string
                    description: Proxy Cache's UUID.
                name:
                    type: string
                    description: Name of the proxy cache created.
                provider:
                    type: string
                    description: Name of proxy cache registry provider.
                url:
                    type: string
                    description: URL of proxy cache provider.
                created_at:
                    type: string
                    description: Date and time of creation of the proxy cache.
                updated_at:
                    type: string
                    description: Date and time of the last change to the proxy cache.
            example:
                id: 0c6bbd87-881a-4bf8-b3f6-4ff3ceacb42c
                name: cool_proxy
                provider: docker-hub
                url: https://hub.docker.com
                created_at: '2024-05-15T19:56:47Z'
                updated_at: '2024-05-15T19:56:47Z'
                description: Proxy cache for Docker Hub
        ProxyCacheStatusResponse:
            type: object
            description: Result of proxy cache connectivity
            properties:
                status:
                    type: string
                    description: Connection status (e.g., "connected", "unreachable")
                message:
                    type: string
                    description: Detailed description of the validation result
            required:
            - status
            example:
                status: connected
                message: Proxy cache configuration is active.
        RegistryRequest:
            type: object
            description: Container Registry Request Object.
            properties:
                name:
                    type: string
                    description: A unique, global name for the container registry.
                        It must be written in lowercase letters and consists only
                        of numbers and letters, up to a limit of 45 characters.
                proxy_cache_id:
                    type: string
                    description: Proxy Cache UUID.
                    default: ''
            required:
            - name
            example:
                name: cool_registry
                proxy_cache_id: ef376048-a0f7-446c-826b-1d5cb3e5a5b0
        MembersResponse:
            type: object
            required:
            - results
            - meta
            properties:
                results:
                    type: array
                    items:
                        $ref: '#/components/schemas/MemberResponse'
                meta:
                    $ref: '#/components/schemas/ListMetadata'
        MemberResponse:
            type: object
            description: Registry member relationship response data.
            required:
            - id
            - registry_id
            - user_id
            - role
            - created_at
            - updated_at
            properties:
                id:
                    type: string
                    description: Registry member relationship UUID.
                registry_id:
                    type: string
