            - name
            - image_count
            - created_at
            - updated_at
            properties:
                registry_name:
                    type: string
                    description: Name of the container registry.
                name:
                    type: string
                    description: Name of the repository.
                image_count:
                    type: integer
                    description: Number of images in the repository.
                created_at:
                    type: string
