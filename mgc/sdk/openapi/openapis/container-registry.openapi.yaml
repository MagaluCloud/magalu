openapi: 3.0.3
info:
    title: mcr-api-product
    description: Magalu Container Registry product API.
    contact:
        name: Tribo IAAS Cloud
        url: https://github.com/luizalabs
        email: suporte@jaxyendy.com
    license:
        name: Apache 2.0
        url: https://www.apache.org/licenses/LICENSE-2.0.html
    version: 0.1.0
servers:
-   url: https://{env}/{region}/container-registry
    description: SE1-YEL pre-prod
    variables:
        region:
            description: Region to reach the service
            default: br-se1
            enum:
            - br-ne1
            - br-se1
            - br-mgl1
            x-mgc-transforms:
            -   type: translate
                allowMissing: true
                translations:
                -   from: br-mgl1
                    to: br-se-1
        env:
            description: Environment to use
            default: api.magalu.cloud
            enum:
            - api.magalu.cloud
            - api.pre-prod.jaxyendy.com
            x-mgc-transforms:
            -   type: translate
                translations:
                -   from: prod
                    to: api.magalu.cloud
                -   from: pre-prod
                    to: api.pre-prod.jaxyendy.com
-   url: https://api-mcr.csre-plat-prod.1.yel.se1.br.jaxyendy.com
    description: SE1-YEL prod
-   url: https://api-mcr.csre-plat-prod.1.gre.se1.br.jaxyendy.com
    description: SE1-GRE prod
-   url: https://api-mcr.csre-plat-preprod.1.gre.se1.br.jaxyendy.com
    description: SE1-GRE pre-prod
-   url: https://api-mcr.csre-plat-preprod.1.yel.ne1.br.jaxyendy.com
    description: NE1-YEL pre-prod
-   url: https://api-mcr.csre-plat-prod.1.yel.ne1.br.jaxyendy.com
    description: NE1-YEL prod
paths:
    /v0/credentials:
        get:
            tags:
            - credentials
            summary: Get credentials for container registry
            description: Return container registry user's authentication credentials.
            operationId: getCredentials
            x-mgc-name: get
            x-permission:
                permission-name: cr_credentials_get
                product-name: containerregistry
            security:
            -   BearerAuth:
                - mcr.read
            -   OAuth2:
                - mcr.read
            responses:
                '200':
                    description: Successful operation
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CredentialsResponse'
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '403':
                    $ref: '#/components/responses/ForbiddenError'
                '404':
                    $ref: '#/components/responses/NotFoundError'
                '429':
                    $ref: '#/components/responses/TooManyRequestsError'
                '500':
                    $ref: '#/components/responses/InternalServerError'
    /v0/credentials/password:
        post:
            tags:
            - credentials
            summary: Reset password
            description: Reset container registry user's password.
            operationId: resetPassword
            x-mgc-confirmable:
                message: Are you sure you want to reset the container registry's password?
            x-permission:
                permission-name: cr_credentials_reset
                product-name: containerregistry
            security:
            -   BearerAuth:
                - mcr.write
            -   OAuth2:
                - mcr.write
            responses:
                '200':
                    description: Successful operation
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CredentialsResponse'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '403':
                    $ref: '#/components/responses/ForbiddenError'
                '404':
                    $ref: '#/components/responses/NotFoundError'
                '429':
                    $ref: '#/components/responses/TooManyRequestsError'
                '500':
                    $ref: '#/components/responses/InternalServerError'
    /v0/registries:
        post:
            tags:
            - registries
            summary: Create a container registry
            description: Creates a container registry in Magalu Cloud.
            operationId: createRegistry
            x-permission:
                permission-name: cr_registry_create
                product-name: containerregistry
            security:
            -   BearerAuth:
                - mcr.write
            -   OAuth2:
                - mcr.write
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/RegistryRequest'
            responses:
                '201':
                    description: Successful operation
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CreateRegistryResponse'
                    links:
                        get:
                            operationId: getRegistry
                            description: Get registry information
                            parameters:
                                registry_id: $response.body#/id
                        delete:
                            operationId: deleteRegistry
                            description: Delete a container registry by registry_id
                            parameters:
                                registry_id: $response.body#/id
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '403':
                    $ref: '#/components/responses/ForbiddenError'
                '404':
                    $ref: '#/components/responses/NotFoundError'
                '429':
                    $ref: '#/components/responses/TooManyRequestsError'
                '500':
                    $ref: '#/components/responses/InternalServerError'
        get:
            tags:
            - registries
            summary: List all container registries
            description: List user's container registries.
            operationId: getRegistries
            x-permission:
                permission-name: cr_registry_list
                product-name: containerregistry
            security:
            -   BearerAuth:
                - mcr.read
            -   OAuth2:
                - mcr.read
            parameters:
            -   name: _limit
                in: query
                required: false
                schema:
                    minimum: 1
                    title: Limit
                    type: integer
                description: Limit
            -   name: _offset
                in: query
                required: false
                schema:
                    minimum: 0
                    type: integer
                description: Offset
            -   name: _sort
                in: query
                required: false
                schema:
                    default: created_at:asc
                    pattern: (^[\w-]+:(asc|desc)(,[\w-]+:(asc|desc))*)?$
                    type: string
                description: Fields to use as reference to sort.
            -   name: name
                in: query
                required: false
                schema:
                    type: string
                description: Name
            responses:
                '200':
                    description: Successful operation
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/RegistriesResponse'
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '403':
                    $ref: '#/components/responses/ForbiddenError'
                '404':
                    $ref: '#/components/responses/NotFoundError'
                '429':
                    $ref: '#/components/responses/TooManyRequestsError'
                '500':
                    $ref: '#/components/responses/InternalServerError'
    /v0/registries/{registry_id}:
        get:
            tags:
            - registries
            summary: Get registry information
            description: Show detailed information about the user's container registry.
            operationId: getRegistry
            x-permission:
                permission-name: cr_registry_get
                product-name: containerregistry
            security:
            -   BearerAuth:
                - mcr.read
            -   OAuth2:
                - mcr.read
            parameters:
            -   name: registry_id
                in: path
                required: true
                schema:
                    type: string
                    format: uuid
                description: Container Registry's UUID.
            responses:
                '200':
                    description: Successful operation
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/RegistryResponse'
                    links:
                        delete:
                            operationId: deleteRegistry
                            description: Delete a container registry by registry_id
                            parameters:
                                registry_id: $response.body#/id
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '403':
                    $ref: '#/components/responses/ForbiddenError'
                '404':
                    $ref: '#/components/responses/NotFoundError'
                '429':
                    $ref: '#/components/responses/TooManyRequestsError'
                '500':
                    $ref: '#/components/responses/InternalServerError'
        delete:
            tags:
            - registries
            summary: Delete a container registry by registry_id
            description: Delete a container registry by uuid.
            operationId: deleteRegistry
            x-permission:
                permission-name: cr_registry_delete
                product-name: containerregistry
            security:
            -   BearerAuth:
                - mcr.write
            -   OAuth2:
                - mcr.write
            parameters:
            -   name: registry_id
                in: path
                required: true
                schema:
                    type: string
                    format: uuid
                description: Container Registry's UUID.
            responses:
                '204':
                    description: Successful operation
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '403':
                    $ref: '#/components/responses/ForbiddenError'
                '404':
                    $ref: '#/components/responses/NotFoundError'
                '429':
                    $ref: '#/components/responses/TooManyRequestsError'
                '500':
                    $ref: '#/components/responses/InternalServerError'
    /v0/proxy-caches:
        post:
            tags:
            - proxy-caches
            summary: Create a proxy cache
            description: Creates a proxy cache in Magalu Cloud.
            operationId: createProxyCache
            x-permission:
                permission-name: cr_proxycache_create
                product-name: containerregistry
            security:
            -   BearerAuth:
                - mcr.write
            -   OAuth2:
                - mcr.write
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ProxyCacheRequest'
            responses:
                '201':
                    description: Successful operation
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CreateProxyCacheResponse'
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '403':
                    $ref: '#/components/responses/ForbiddenError'
                '404':
                    $ref: '#/components/responses/NotFoundError'
                '429':
                    $ref: '#/components/responses/TooManyRequestsError'
                '500':
                    $ref: '#/components/responses/InternalServerError'
        get:
            tags:
            - proxy-caches
            summary: List all proxy-caches
            description: List user's proxy caches.
            operationId: getProxyCaches
            x-permission:
                permission-name: cr_proxycache_list
                product-name: containerregistry
            security:
            -   BearerAuth:
                - mcr.read
            -   OAuth2:
                - mcr.read
            parameters:
            -   name: _limit
                in: query
                required: false
                schema:
                    minimum: 1
                    title: Limit
                    type: integer
                description: Limit
            -   name: _offset
                in: query
                required: false
                schema:
                    minimum: 0
                    type: integer
                description: Offset
            -   name: _sort
                in: query
                required: false
                schema:
                    default: created_at:asc
                    pattern: (^[\w-]+:(asc|desc)(,[\w-]+:(asc|desc))*)?$
                    type: string
                description: Fields to use as reference to sort.
            responses:
                '200':
                    description: Successful operation
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ProxyCachesResponse'
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '403':
                    $ref: '#/components/responses/ForbiddenError'
                '404':
                    $ref: '#/components/responses/NotFoundError'
                '429':
                    $ref: '#/components/responses/TooManyRequestsError'
                '500':
                    $ref: '#/components/responses/InternalServerError'
    /v0/proxy-caches/{proxy_cache_id}:
        get:
            tags:
            - proxy-caches
            summary: Get a proxy cache by proxy_cache_id
            description: Get a proxycache by uuid.
            operationId: getProxyCache
            x-permission:
                permission-name: cr_proxycache_get
                product-name: containerregistry
            security:
            -   BearerAuth:
                - mcr.read
            -   OAuth2:
                - mcr.read
            parameters:
            -   name: proxy_cache_id
                in: path
                required: true
                schema:
                    type: string
                    format: uuid
                description: Proxy cache's UUID.
            responses:
                '200':
                    description: Successful operation
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ProxyCacheDetailedResponse'
                    links:
                        update:
                            operationId: updateProxyCache
                            description: Update a proxy cache by proxy_cache_id
                            parameters:
                                proxy_cache_id: $request.path.proxy_cache_id
                        delete:
                            operationId: deleteProxyCache
                            description: Delete a proxy cache by proxy_cache_id
                            parameters:
                                proxy_cache_id: $request.path.proxy_cache_id
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '403':
                    $ref: '#/components/responses/ForbiddenError'
                '404':
                    $ref: '#/components/responses/NotFoundError'
                '429':
                    $ref: '#/components/responses/TooManyRequestsError'
                '500':
                    $ref: '#/components/responses/InternalServerError'
        patch:
            tags:
            - proxy-caches
            summary: Update a proxy cache by proxy_cache_id
            description: Update a proxycache by uuid.
            operationId: updateProxyCache
            x-permission:
                permission-name: cr_proxycache_update
                product-name: containerregistry
            security:
            -   BearerAuth:
                - mcr.write
            -   OAuth2:
                - mcr.write
            parameters:
            -   name: proxy_cache_id
                in: path
                required: true
                schema:
                    type: string
                    format: uuid
                description: Proxy cache's UUID.
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/UpdateProxyCacheRequest'
            responses:
                '200':
                    description: Successful operation
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UpdateProxyCacheResponse'
                    links:
                        get:
                            operationId: getProxyCache
                            description: Get a proxy cache by proxy_cache_id
                            parameters:
                                proxy_cache_id: $request.path.proxy_cache_id
                        delete:
                            operationId: deleteProxyCache
                            description: Delete a proxy cache by proxy_cache_id
                            parameters:
                                proxy_cache_id: $request.path.proxy_cache_id
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '403':
                    $ref: '#/components/responses/ForbiddenError'
                '404':
                    $ref: '#/components/responses/NotFoundError'
                '429':
                    $ref: '#/components/responses/TooManyRequestsError'
                '500':
                    $ref: '#/components/responses/InternalServerError'
        delete:
            tags:
            - proxy-caches
            summary: Delete a proxy cache by proxy_cache_id
            description: Delete a proxycache by uuid.
            operationId: deleteProxyCache
            x-permission:
                permission-name: cr_proxycache_delete
                product-name: containerregistry
            security:
            -   BearerAuth:
                - mcr.write
            -   OAuth2:
                - mcr.write
            parameters:
            -   name: proxy_cache_id
                in: path
                required: true
                schema:
                    type: string
                    format: uuid
                description: Proxy cache's UUID.
            responses:
                '204':
                    description: Successful operation
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '403':
                    $ref: '#/components/responses/ForbiddenError'
                '404':
                    $ref: '#/components/responses/NotFoundError'
                '429':
                    $ref: '#/components/responses/TooManyRequestsError'
                '500':
                    $ref: '#/components/responses/InternalServerError'
    /v0/proxy-caches/status:
        post:
            tags:
            - proxy-caches
            summary: Test connectivity using proxy cache credentials
            description: 'Validates the provided credentials and endpoint information
                for a remote registry

                used in a proxy cache configuration. This endpoint does not persist
                any data — it only

                tests if the given credentials allow access to the target registry.

                '
            operationId: checkProxyCacheCredentialStatus
            x-permission:
                permission-name: cr_proxycache_check
                product-name: containerregistry
            security:
            -   BearerAuth:
                - mcr.read
            -   OAuth2:
                - mcr.read
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ProxyCacheCredentialStatusRequest'
            responses:
                '200':
                    description: Successful operation
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ProxyCacheCredentialStatusResponse'
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '403':
                    $ref: '#/components/responses/ForbiddenError'
                '404':
                    $ref: '#/components/responses/NotFoundError'
                '429':
                    $ref: '#/components/responses/TooManyRequestsError'
                '500':
                    $ref: '#/components/responses/InternalServerError'
    /v0/proxy-caches/{proxy_cache_id}/status:
        get:
            tags:
            - proxy-caches
            summary: Get proxy cache connection status
            description: 'Verifies and returns the current connection status of a
                configured proxy cache,

                including validation of credentials and endpoint accessibility.

                '
            operationId: getProxyCacheStatus
            x-permission:
                permission-name: cr_proxycache_get
                product-name: containerregistry
            security:
            -   BearerAuth:
                - mcr.read
            -   OAuth2:
                - mcr.read
            parameters:
            -   name: proxy_cache_id
                in: path
                required: true
                description: Unique identifier of the proxy cache configuration
                schema:
                    type: string
                    format: uuid
                    example: 123e4567-e89b-12d3-a456-426614174000
            responses:
                '200':
                    description: Proxy cache status verification result
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ProxyCacheStatusResponse'
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '403':
                    $ref: '#/components/responses/ForbiddenError'
                '404':
                    $ref: '#/components/responses/NotFoundError'
                '500':
                    $ref: '#/components/responses/InternalServerError'
    /v0/users:
        post:
            tags:
            - users
            summary: Create a user
            description: Creates a container registry user using the authId from the
                request context.
            operationId: createUser
            x-permission:
                permission-name: cr_user_create
                product-name: containerregistry
            security:
            -   BearerAuth:
                - mcr.write
            -   OAuth2:
                - mcr.write
            responses:
                '201':
                    description: Successful operation
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UserResponse'
                    links:
                        delete:
                            operationId: deleteUser
                            description: Delete a user by user_id
                            parameters:
                                user_id: $response.body#/id
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '403':
                    $ref: '#/components/responses/ForbiddenError'
                '404':
                    $ref: '#/components/responses/NotFoundError'
                '500':
                    $ref: '#/components/responses/InternalServerError'
        get:
            tags:
            - users
            summary: Get user
            description: Returns the authenticated user.
            operationId: getUser
            x-permission:
                permission-name: cr_user_get
                product-name: containerregistry
            security:
            -   BearerAuth:
                - mcr.read
            -   OAuth2:
                - mcr.read
            responses:
                '200':
                    description: Successful operation
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UserResponse'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '404':
                    $ref: '#/components/responses/NotFoundError'
                '500':
                    $ref: '#/components/responses/InternalServerError'
    /v0/users/{user_id}:
        delete:
            tags:
            - users
            summary: Delete a user by user_id
            description: Delete a user by UUID.
            operationId: deleteUser
            x-permission:
                permission-name: cr_user_delete
                product-name: containerregistry
            security:
            -   BearerAuth:
                - mcr.write
            -   OAuth2:
                - mcr.write
            parameters:
            -   name: user_id
                in: path
                required: true
                schema:
                    type: string
                    format: uuid
                description: User's UUID.
            responses:
                '204':
                    description: Successful operation
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '403':
                    $ref: '#/components/responses/ForbiddenError'
                '404':
                    $ref: '#/components/responses/NotFoundError'
                '429':
                    $ref: '#/components/responses/TooManyRequestsError'
                '500':
                    $ref: '#/components/responses/InternalServerError'
    /v0/registries/{registry_id}/members:
        post:
            tags:
            - members
            summary: Add a member to a container registry
            description: Adds an existing user as a member of a container registry
                with a specific role.
            operationId: addRegistryMember
            x-permission:
                permission-name: cr_registry_member_add
                product-name: containerregistry
            security:
            -   BearerAuth:
                - mcr.write
            -   OAuth2:
                - mcr.write
            parameters:
            -   name: registry_id
                in: path
                required: true
                schema:
                    type: string
                    format: uuid
                description: Container Registry's UUID.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/MemberRequest'
            responses:
                '201':
                    description: Successful operation
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MemberResponse'
                    links:
                        list:
                            operationId: getRegistryMembers
                            description: List all members of a container registry
                            parameters:
                                registry_id: $request.path.registry_id
                        get:
                            operationId: getRegistryMember
                            description: Get registry member details
                            parameters:
                                registry_id: $request.path.registry_id
                                member_id: $response.body#/id
                        update:
                            operationId: updateRegistryMember
                            description: Update a registry member's role
                            parameters:
                                registry_id: $request.path.registry_id
                                member_id: $response.body#/id
                        delete:
                            operationId: deleteRegistryMember
                            description: Remove a member from a container registry
                            parameters:
                                registry_id: $request.path.registry_id
                                member_id: $response.body#/id
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '403':
                    $ref: '#/components/responses/ForbiddenError'
                '404':
                    $ref: '#/components/responses/NotFoundError'
                '429':
                    $ref: '#/components/responses/TooManyRequestsError'
                '500':
                    $ref: '#/components/responses/InternalServerError'
        get:
            tags:
            - members
            summary: List all members of a container registry
            description: Returns a paginated list of all users associated with the
                container registry.
            operationId: getRegistryMembers
            x-permission:
                permission-name: cr_registry_member_get
                product-name: containerregistry
            security:
            -   BearerAuth:
                - mcr.read
            -   OAuth2:
                - mcr.read
            parameters:
            -   name: registry_id
                in: path
                required: true
                schema:
                    type: string
                    format: uuid
                description: Container Registry's UUID.
            -   name: _limit
                in: query
                required: false
                schema:
                    minimum: 1
                    type: integer
                description: Limit.
            -   name: _offset
                in: query
                required: false
                schema:
                    minimum: 0
                    type: integer
                description: Offset.
            -   name: _sort
                in: query
                required: false
                schema:
                    default: created_at:desc
                    type: string
                description: Fields to sort by.
            responses:
                '200':
                    description: Successful operation
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MembersResponse'
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '403':
