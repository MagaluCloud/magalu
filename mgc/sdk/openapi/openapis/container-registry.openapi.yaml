            type: object
            description: Repository images response.
            required:
            - results
            - meta
            properties:
                results:
                    type: array
                    description: List of repository images.
                    items:
                        $ref: '#/components/schemas/ImageResponse'
                meta:
                    $ref: '#/components/schemas/ListMetadata'
        ImageResponse:
            type: object
            description: Repository image response data.
            required:
            - digest
            - size_bytes
            - pushed_at
            - pulled_at
            - tags
            properties:
                digest:
                    type: string
                    description: Image digest.
                size_bytes:
                    type: integer
                    description: Image size in bytes.
                pushed_at:
                    type: string
                    description: Date and time when the image was pushed.
                pulled_at:
                    type: string
                    description: Date and time when the image was pulled.
                manifest_media_type:
                    type: string
                    description: The manifest media type of the image.
                media_type:
                    type: string
                    description: The media type of the image.
                tags:
                    type: array
                    description: Tags of the image.
                    items:
                        type: string
                        description: Tag names.
                tags_details:
                    type: array
                    description: Tags details of the image
                    items:
                        $ref: '#/components/schemas/ImageTagResponse'
                extra_attr:
                    type: object
                    description: Extra attributes about the image.
            example:
                digest: sha256:aef9ff594b36575be6248901a4e5a9bad031f3e0fd42c33a6d2bd501dde5e955
                size_bytes: 3552429
                pushed_at: '2024-05-15T19:56:47Z'
                pulled_at: '2024-05-15T19:56:47Z'
                tags:
                - latest
                manifest_media_type: application/vnd.docker.distribution.manifest.v2+json
                media_type: application/vnd.docker.container.image.v1+json
                tags_details:
                -   name: latest
                    pushed_at: '2024-05-15T19:56:47Z'
                    pulled_at: '2024-05-15T19:56:47Z'
                    signed: false
                extra_attr: {}
        ScanStatus:
            type: string
            description: Image scan status.
            enum:
            - pending
            - running
            - completed
            - failed
            - stopped
            example: completed
        VulnerabilitySeverity:
            type: string
            description: Vulnerability severity level.
            enum:
            - unknown
            - low
            - medium
            - high
            - critical
            example: high
        SeverityResponse:
            type: object
            description: Image scan severity data.
            required:
            - total
            - low
            - medium
            - high
            - critical
            - fixable
            properties:
                total:
                    type: integer
                    description: Vulnerabilities total count.
                low:
                    type: integer
                    description: Low vulnerabilities count.
                medium:
                    type: integer
                    description: Medium vulnerabilities count.
                high:
                    type: integer
                    description: High vulnerabilities count.
                critical:
                    type: integer
                    description: Critical vulnerabilities count.
                fixable:
                    type: integer
                    description: Fixable vulnerabilities count.
            example:
                total: 10
                low: 3
                medium: 3
                high: 3
                critical: 1
                fixable: 6
        ImageScanScheduleResponse:
            type: object
            description: Image scan scheduling response data.
            required:
            - id
            - digest
            - registry_id
            - repository_id
            - status
            - created_at
            - updated_at
            properties:
                id:
                    type: string
                    description: Scan Job ID.
                digest:
                    type: string
                    description: Image digest.
                registry_id:
                    type: string
                    description: Registry UUID.
                repository_id:
                    type: string
                    description: Repository UUID.
                input_tag:
                    type: string
                    nullable: true
                    description: Image tag
                status:
                    $ref: '#/components/schemas/ScanStatus'
                created_at:
                    type: string
                    description: Date and time of image scan scheduling.
                updated_at:
                    type: string
                    description: Date and time of the last scan update.
            example:
                id: 00000000-0000-0000-0000-000000000000
                digest: sha256:000000000
                input_tag: latest
                registry_id: 00000000-0000-0000-0000-000000000000
                repository_id: 00000000-0000-0000-0000-000000000000
                status: pending
                created_at: '2024-05-15T19:56:47Z'
                updated_at: '2024-05-15T19:56:47Z'
        ImageScanResponse:
            type: object
            description: Image scan response data.
            required:
            - id
            - digest
            - status
            - created_at
            - updated_at
            properties:
                id:
                    type: string
                    description: Scan Job ID.
                digest:
                    type: string
                    description: Image digest.
                input_tag:
                    type: string
                    description: Image tag
                status:
                    $ref: '#/components/schemas/ScanStatus'
                os:
                    type: string
                    nullable: true
                    description: Artifact operating system.
                architecture:
                    type: string
                    nullable: true
                    description: Artifact hardware architecture.
                severity_summary:
                    $ref: '#/components/schemas/SeverityResponse'
                created_at:
                    type: string
                    description: Date and time of image scan scheduling.
                updated_at:
                    type: string
                    description: Date and time of the last scan update.
                finished_at:
                    type: string
                    nullable: true
                    description: Date and time of image scan completion.
                child_scans:
                    type: array
                    description: List of child image scans.
                    items:
                        $ref: '#/components/schemas/ChildImageScanResponse'
            example:
                id: 00000000-0000-0000-0000-000000000000
                digest: sha256:000000000
                input_tag: latest
                status: completed
                os: linux
                architecture: arm64
                severity_summary:
                    total: 10
                    low: 3
                    medium: 3
                    high: 3
                    critical: 1
                    fixable: 6
                created_at: '2024-05-15T19:56:47Z'
                updated_at: '2024-05-15T19:57:47Z'
                finished_at: '2024-05-15T19:57:47Z'
                child_scans:
                -   id: 11111111-1111-1111-1111-111111111111
                    digest: sha256:111111111
                    status: completed
                    os: linux
                    architecture: amd64
                    severity_summary:
                        total: 4
                        low: 1
                        medium: 1
                        high: 1
                        critical: 1
                        fixable: 2
                    created_at: '2024-05-15T19:56:47Z'
                    updated_at: '2024-05-15T19:57:47Z'
                    finished_at: '2024-05-15T19:57:47Z'
        ChildImageScanResponse:
            type: object
            description: Child image scan response data.
            required:
            - id
            - digest
            - status
            - created_at
            - updated_at
            properties:
                id:
                    type: string
                    description: Scan Job ID.
                digest:
                    type: string
                    description: Image digest.
                input_tag:
                    type: string
                    nullable: true
                    description: Image tag
                status:
                    $ref: '#/components/schemas/ScanStatus'
                os:
                    type: string
                    nullable: true
                    description: Artifact operating system.
                architecture:
                    type: string
                    nullable: true
                    description: Artifact hardware architecture.
                severity_summary:
                    $ref: '#/components/schemas/SeverityResponse'
                created_at:
                    type: string
                    description: Date and time of image scan scheduling.
                updated_at:
                    type: string
                    description: Date and time of the last scan update.
                finished_at:
                    type: string
                    nullable: true
                    description: Date and time of image scan completion.
            example:
                id: 11111111-1111-1111-1111-111111111111
                digest: sha256:111111111
                input_tag: latest
                status: completed
                os: linux
                architecture: amd64
                severity_summary:
                    total: 4
                    low: 1
                    medium: 1
                    high: 1
                    critical: 1
                    fixable: 2
                created_at: '2024-05-15T19:56:47Z'
                updated_at: '2024-05-15T19:57:47Z'
                finished_at: '2024-05-15T19:57:47Z'
        ImageScansResponse:
            type: object
            description: Image scans response.
            required:
            - results
            - meta
            properties:
                results:
                    type: array
                    description: List of image scans.
                    items:
                        $ref: '#/components/schemas/ImageScanResponse'
                meta:
                    $ref: '#/components/schemas/ListMetadata'
        VulnerabilityCvssSourceResponse:
            type: object
            description: CVSS details for a specific source.
            properties:
                score:
                    type: number
                    format: float
                    nullable: true
                    description: CVSS v3 score.
                vector:
                    type: string
                    nullable: true
                    description: CVSS v3 vector.
        VulnerabilityCvssMaxResponse:
            type: object
            description: Highest CVSS v3 score found among the available sources.
            properties:
                source:
                    type: string
                    nullable: true
                    description: Source that provided the highest CVSS v3 score.
                score:
                    type: number
                    format: float
                    nullable: true
                    description: Highest CVSS v3 score found.
                vector:
                    type: string
                    nullable: true
                    description: CVSS v3 vector associated with the highest score.
        VulnerabilityCvssResponse:
            type: object
            description: CVSS information aggregated from Harbor scan sources.
            required:
            - preferred
            - max
            - by_source
            properties:
                preferred:
                    allOf:
                    -   $ref: '#/components/schemas/VulnerabilityCvssSourceResponse'
                    nullable: true
                    description: Preferred CVSS v3 information reported by Harbor.
                max:
                    allOf:
                    -   $ref: '#/components/schemas/VulnerabilityCvssMaxResponse'
                    nullable: true
                    description: Highest CVSS v3 information found among the available
                        sources.
                by_source:
                    type: object
                    description: CVSS v3 information indexed by source name.
                    additionalProperties:
                        $ref: '#/components/schemas/VulnerabilityCvssSourceResponse'
                    example:
                        nvd:
                            score: 6.5
                            vector: CVSS:3.0/AV:L/AC:L/PR:L/UI:N/S:C/C:N/I:H/A:N
                        redhat:
                            score: 8.6
                            vector: CVSS:3.0/AV:L/AC:L/PR:N/UI:R/S:C/C:H/I:H/A:H
            example:
                preferred:
                    score: 6.5
                    vector: CVSS:3.0/AV:L/AC:L/PR:L/UI:N/S:C/C:N/I:H/A:N
                max:
                    source: redhat
                    score: 8.6
                    vector: CVSS:3.0/AV:L/AC:L/PR:N/UI:R/S:C/C:H/I:H/A:H
                by_source:
                    nvd:
                        score: 6.5
                        vector: CVSS:3.0/AV:L/AC:L/PR:L/UI:N/S:C/C:N/I:H/A:N
                    redhat:
                        score: 8.6
                        vector: CVSS:3.0/AV:L/AC:L/PR:N/UI:R/S:C/C:H/I:H/A:H
        VulnerabilityResponse:
            type: object
            description: Vulnerability response data.
            required:
            - cve_id
            - severity
            - package_name
            - current_version
            - description
            - links
            - fixable
            - is_allowlisted
            - cvss
            properties:
                cve_id:
                    type: string
                    description: CVE ID.
                severity:
                    $ref: '#/components/schemas/VulnerabilitySeverity'
                cvss:
                    $ref: '#/components/schemas/VulnerabilityCvssResponse'
                is_allowlisted:
                    type: boolean
                    description: Indicates whether the vulnerability is allowlisted.
                    default: false
                package_name:
                    type: string
                    description: Affected package name.
                current_version:
                    type: string
                    description: Affected package current version.
                fixed_version:
                    type: string
                    nullable: true
                    description: Version containing a fix.
                fixable:
                    type: boolean
                    description: Indicates whether a fix is available.
                target_path:
                    type: string
                    description: Path of the affected package.
                description:
                    type: string
                    description: Vulnerability description.
                links:
                    type: array
                    description: List of reference links.
                    items:
                        type: string
            example:
                cve_id: CVE-2016-2781
                severity: low
                cvss:
                    preferred:
                        score: 6.5
                        vector: CVSS:3.0/AV:L/AC:L/PR:L/UI:N/S:C/C:N/I:H/A:N
                    max:
                        source: redhat
                        score: 8.6
                        vector: CVSS:3.0/AV:L/AC:L/PR:N/UI:R/S:C/C:H/I:H/A:H
                    by_source:
                        nvd:
                            score: 6.5
                            vector: CVSS:3.0/AV:L/AC:L/PR:L/UI:N/S:C/C:N/I:H/A:N
                        redhat:
                            score: 8.6
                            vector: CVSS:3.0/AV:L/AC:L/PR:N/UI:R/S:C/C:H/I:H/A:H
                is_allowlisted: false
                package_name: coreutils
                current_version: 9.4-3ubuntu6.1
                fixed_version: null
                fixable: false
                target_path: /usr/bin/chroot
                description: Example vulnerability description.
                links:
                - https://avd.aquasec.com/nvd/cve-2016-2781
        VulnerabilitiesResponse:
            type: object
            description: Vulnerabilities response.
            required:
            - results
            - meta
            properties:
                results:
                    type: array
                    description: List of vulnerabilities found in the image scan.
                    items:
                        $ref: '#/components/schemas/VulnerabilityResponse'
                meta:
                    $ref: '#/components/schemas/ListMetadata'
        ImageTagResponse:
            type: object
            description: Tag of an image response.
            properties:
                name:
                    type: string
                    description: Tag name.
                pushed_at:
                    type: string
                    description: Date and time when the tag was pushed.
                pulled_at:
                    type: string
                    description: Date and time when the tag was pulled.
                signed:
                    type: boolean
                    description: Boolean value indicating if the image is signed or
                        not.
            example:
                name: latest
                pushed_at: '2024-05-15T19:56:47Z'
                pulled_at: '2024-05-15T19:56:47Z'
                signed: false
        UserResponse:
            type: object
            description: Container registry user information.
            required:
            - id
            - username
            - created_at
            properties:
                id:
                    type: string
                    description: Unique identifier for the container registry user.
                username:
                    type: string
                    description: The username used for registry authentication (usually
                        the authId from the request context).
                created_at:
                    type: string
                    description: Timestamp when the registry user was created.
            example:
                id: e3d49354-35d7-4565-b634-65d8b86aa594
                username: e3d49354-35d7-4565-b634-65d8b86aa594
                created_at: '2024-05-15T19:56:47Z'
        Error:
            type: object
            required:
            - slug
            - message
            description: Details regarding an error.
            properties:
                message:
                    title: Message
                    type: string
                slug:
                    title: Slug
                    type: string
            example:
                message: Unauthorized
                slug: Unauthorized
    securitySchemes:
        BearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT
        OAuth2:
            flows:
                authorizationCode:
                    authorizationUrl: https://idp-maas-sandbox.ipet.sh/auth/realms/master/protocol/openid-connect/auth
                    tokenUrl: https://idp-maas-sandbox.ipet.sh/auth/realms/master/protocol/openid-connect/token
                    scopes:
                        mcr.read: Read IaaS resource information
                        mcr.write: Write IaaS resource information
            type: oauth2
            description: OAuth2 via IDPA
    responses:
        InternalServerError:
            description: Internal Server Error
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
                    example:
                        slug: internal_server_error
                        message: 'error when getting resource: timeout'
                        detail: {}
        BadRequestError:
            description: Bad Request
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
                    example:
                        slug: bad_request
                        message: invalid param
                        detail: {}
        NotFoundError:
            description: Not Found
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
                    example:
                        slug: not_found
                        message: 'error when getting resource: not found'
                        detail: {}
        UnauthorizedError:
            description: Unauthorized
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
                    example:
                        slug: unauthorized
                        message: invalid email on token
                        detail: {}
        ForbiddenError:
            description: Forbidden
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
                    example:
                        slug: forbidden
                        message: user not allowed
                        detail: {}
        ConflictError:
            description: Conflict
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
                    example:
                        slug: conflict
                        message: resource already exists
                        detail: {}
        TooManyRequestsError:
            description: Too Many Requests
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
                    example:
                        slug: too_many_requests
                        message: too many requests
                        detail: {}
