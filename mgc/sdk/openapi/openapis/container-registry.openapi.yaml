            - updated_at
            properties:
                id:
                    type: string
                    description: Container Registry's UUID.
                name:
                    type: string
                    description: Name of the container registry created.
                storage_usage_bytes:
                    type: integer
                    description: Storage used in bytes.
                created_at:
                    type: string
